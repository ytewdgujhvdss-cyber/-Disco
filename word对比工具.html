<!-- JSZip: parse .docx (ZIP-based) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/diff@5.2.0/dist/diff.min.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Microsoft YaHei','PingFang SC',Arial,sans-serif;background:#0a0e1a;color:#e0e8f0;min-height:100vh}
body::before{
  content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse at 20% 50%,rgba(30,60,120,.3) 0%,transparent 60%),
             radial-gradient(ellipse at 80% 20%,rgba(10,40,90,.4) 0%,transparent 50%),
             radial-gradient(ellipse at 60% 80%,rgba(5,20,60,.3) 0%,transparent 50%);
  pointer-events:none;z-index:0
}
.container{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:40px 20px}

/* Header */
header{text-align:center;margin-bottom:36px}
.logo{font-size:12px;letter-spacing:3px;color:#4a9eff;text-transform:uppercase;margin-bottom:12px;opacity:.8}
header h1{font-size:32px;font-weight:700;letter-spacing:1px;

.back-link{display:inline-block;margin-top:12px;font-size:12px;color:#4a9eff;text-decoration:none;opacity:.7;transition:opacity .2s}

/* Upload Section */

@media(max-width:700px){.upload-section{grid-template-columns:1fr}}

.upload-icon{font-size:28px;margin-bottom:10px}

.upload-card .file-name{display:none;font-size:12px;font-weight:600;color:#22c55e;margin-top:4px;word-break:break-all}

.btn-remove{display:none;margin-top:8px;background:rgba(239,68,68,.2);color:#f87171;border:1px solid rgba(239,68,68,.3);padding:3px 12px;border-radius:4px;font-size:11px;cursor:pointer}
.upload-card.has-file .btn-remove{display:inline-block}

/* Format badges */

/* Action */

  background:linear-gradient(135deg,#1a3a6a,#0f3460);
  color:#fff;border:1px solid rgba(74,158,255,.3);
  padding:12px 44px;border-radius:10px;font-size:15px;font-weight:600;

}

/* Loading */
.loading{display:none;text-align:center;padding:36px}
.loading.active{display:block}
.spinner{width:40px;height:40px;border:3px solid rgba(74,158,255,.15);border-top-color:#4a9eff;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px}

/* Error */

.error-box.active{display:block}

/* Results */
.results{display:none}

.summary-bar{
  background:rgba(255,255,255,.03);border:1px solid rgba(74,158,255,.12);
  border-radius:12px;padding:20px 24px;margin-bottom:20px;
  display:grid;grid-template-columns:repeat(4,1fr);gap:16px
}

.summary-item{text-align:center}
.summary-item .num{font-size:28px;font-weight:700;color:#4a9eff}

  background:rgba(255,255,255,.03);border:1px solid rgba(74,158,255,.12);

}
.table-result h2{font-size:15px;font-weight:600;color:#c8dff0;margin-bottom:10px}
.table-meta{display:flex;gap:14px;margin-bottom:12px;font-size:11px;color:#5a7a9a}

.change-row{
  border:1px solid rgba(74,158,255,.08);border-radius:8px;padding:12px;margin-bottom:8px;
  background:rgba(255,255,255,.02)

.change-row.added{border-left:3px solid #22c55e;background:rgba(34,197,94,.05)}
.change-row.deleted{border-left:3px solid #ef4444;background:rgba(239,68,68,.05)}

.row-key{font-weight:600;font-size:13px;color:#c8dff0;margin-bottom:4px}
.row-meta{font-size:11px;color:#5a7a9a;margin-bottom:6px}

.cell-diff{padding:6px 10px;margin:2px 0;border-radius:4px;font-size:12px;line-height:1.5}
.cell-diff .cell-header{font-weight:600;font-size:10px;color:#5a7a9a;margin-bottom:2px}
.cell-diff.changed{background:rgba(255,255,255,.03);border:1px solid rgba(74,158,255,.1)}
.cell-diff.unchanged{color:#4a5a6a}

.pdf-page-diff{padding:10px 14px;margin:6px 0;border-radius:6px;font-size:12px;line-height:1.7}
.pdf-page-diff.added{background:rgba(34,197,94,.06);border-left:3px solid #22c55e}
.pdf-page-diff.deleted{background:rgba(239,68,68,.06);border-left:3px solid #ef4444}
.pdf-page-diff.modified{background:rgba(245,158,11,.05);border-left:3px solid #f59e0b}

.d{background:rgba(239,68,68,.2);color:#f87171;text-decoration:line-through;padding:1px 3px;border-radius:2px}
.i{background:rgba(34,197,94,.2);color:#4ade80;padding:1px 3px;border-radius:2px}

.badge{font-size:10px;font-weight:600;padding:1px 6px;border-radius:8px;display:inline-block}
.badge-added{background:rgba(34,197,94,.15);color:#4ade80}
.badge-deleted{background:rgba(239,68,68,.15);color:#f87171}
.badge-modified{background:rgba(245,158,11,.15);color:#fbbf24}

.download-bar{text-align:center;margin-top:20px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.btn-dl{

  color:#fff;border:1px solid rgba(74,158,255,.3);

  cursor:pointer;transition:all .25s;text-decoration:none;display:inline-block
}
.btn-dl:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(74,158,255,.2);border-color:#4a9eff}
.btn-dl.html{background:linear-gradient(135deg,#312e81,#1e1b4b);border-color:rgba(99,102,241,.3)}
.btn-dl.html:hover{box-shadow:0 6px 20px rgba(99,102,241,.2)}

footer{text-align:center;margin-top:36px;font-size:11px;color:#2a4a6a;letter-spacing:.5px}
.collapse-btn{background:none;border:none;color:#4a9eff;cursor:pointer;font-size:11px;padding:3px 6px;margin-top:2px;opacity:.7}
.collapse-btn:hover{opacity:1}
</style>

<body>

<div class="container">
<header>
  <div class="logo">✈ Document Diff</div>
  <h1>文档差异对比</h1>
  <p>支持 .docx（表格级对比）和 .pdf（逐页文本对比）· 所有处理在浏览器本地完成</p>
  <div class="divider"></div>
  <a href="https://ytewdgujhvdss-cyber.github.io/-Disco/" class="back-link">← 返回飞行工具箱</a>
</header>

<div class="upload-section">
  <div class="upload-card" id="card-old" onclick="document.getElementById('input-old').click()">
    <div class="format-tabs">
      <span class="format-badge active" id="fmt-old">.docx / .pdf</span>
    </div>
    <div class="upload-icon">📋</div>
    <h3>原始文档（修改前）</h3>
    <p class="hint">点击上传或拖拽文件到此处</p>
    <p class="file-name" id="name-old"></p>
    <button class="btn-remove" onclick="removeFile('old',event)">✕ 移除</button>
  </div>
  <div class="upload-card" id="card-new" onclick="document.getElementById('input-new').click()">
    <div class="format-tabs">
      <span class="format-badge active" id="fmt-new">.docx / .pdf</span>
    </div>
    <div class="upload-icon">📝</div>
    <h3>修改文档（修改后）</h3>
    <p class="hint">点击上传或拖拽文件到此处</p>
    <p class="file-name" id="name-new"></p>
    <button class="btn-remove" onclick="removeFile('new',event)">✕ 移除</button>
  </div>
</div>

<input type="file" id="input-old" class="hidden-input" accept=".docx,.pdf" onchange="handleFileSelect('old',this)">
<input type="file" id="input-new" class="hidden-input" accept=".docx,.pdf" onchange="handleFileSelect('new',this)">

<div class="action-bar">
  <button class="btn-compare" id="btn-compare" disabled onclick="startCompare()">🔍 开始对比</button>
</div>

<div class="loading" id="loading"><div class="spinner"></div><p id="loading-msg">正在解析文档并逐项对比...</p></div>
<div class="error-box" id="error-box"></div>
<div class="results" id="results">
  <div class="summary-bar" id="summary-bar"></div>
  <div id="detail-area"></div>
  <div class="download-bar" id="download-bar"></div>
</div>

</div>
<footer>All processing happens locally in your browser · No data uploaded</footer>

<script>
// ─── PDF.js setup ────────────────────────────
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ─── State ───────────────────────────────────
let files = { old: null, new: null };
let lastResults = null;

// ─── File Handling ───────────────────────────
function handleFileSelect(type, input) {
  if (input.files.length > 0) { files[type] = input.files[0]; updateCard(type); }
}
function removeFile(type, e) { e.stopPropagation(); files[type] = null; document.getElementById('input-'+type).value=''; updateCard(type); }
function updateCard(type) {
  let c = document.getElementById('card-'+type), n = document.getElementById('name-'+type);
  let fb = document.getElementById('fmt-'+type);
  if (files[type]) {
    c.classList.add('has-file'); n.textContent = '📎 ' + files[type].name;
    fb.textContent = files[type].name.toLowerCase().endsWith('.pdf') ? '.pdf' : '.docx';
    fb.classList.add('active');
  } else { c.classList.remove('has-file'); n.textContent = ''; fb.textContent = '.docx / .pdf'; }
  document.getElementById('btn-compare').disabled = !(files.old && files.new);
}
['old','new'].forEach(type => {
  let c = document.getElementById('card-'+type);
  c.addEventListener('dragover', e => { e.preventDefault(); c.classList.add('dragover'); });
  c.addEventListener('dragleave', () => c.classList.remove('dragover'));
  c.addEventListener('drop', e => {
    e.preventDefault(); c.classList.remove('dragover');
    let f = e.dataTransfer.files[0];
    let ext = f.name.toLowerCase().split('.').pop();
    if (ext === 'docx' || ext === 'pdf') { files[type] = f; updateCard(type); }
    else showError('请上传 .docx 或 .pdf 格式文件');
  });
});

// ─── Utility ─────────────────────────────────
function escHtml(s) { let d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// ═══════════════════════════════════════════════
//  DOCX PARSING ENGINE
// ═══════════════════════════════════════════════

function getCellText(tcElement) {
  let texts = [];
  let paragraphs = tcElement.getElementsByTagNameNS('http://schemas.openxmlformats.org/wordprocessingml/2006/main', 'p');
  for (let p of paragraphs) {
    let parts = [];
    let runs = p.getElementsByTagNameNS('http://schemas.openxmlformats.org/wordprocessingml/2006/main', 'r');
    for (let r of runs) {
      let tEls = r.getElementsByTagNameNS('http://schemas.openxmlformats.org/wordprocessingml/2006/main', 't');
      for (let t of tEls) parts.push(t.textContent || '');
    }
    if (parts.length > 0) texts.push(parts.join(''));
  }
  return texts.join('\n');
}

async function parseDocx(file) {
  let buffer = await file.arrayBuffer();
  let zip = await JSZip.loadAsync(buffer);
  let xmlText = await zip.file('word/document.xml').async('string');
  let parser = new DOMParser();
  let xmlDoc = parser.parseFromString(xmlText, 'text/xml');
  let ns = 'http://schemas.openxmlformats.org/wordprocessingml/2006/main';
  let body = xmlDoc.getElementsByTagNameNS(ns, 'body')[0];
  if (!body) return { tables: [], paragraphs: [] };

  // Extract tables
  let tables = [];
  let tblEls = body.getElementsByTagNameNS(ns, 'tbl');
  for (let tbl of tblEls) {
    let rows = [];
    let trEls = tbl.getElementsByTagNameNS(ns, 'tr');
    for (let tr of trEls) {
      let cells = [];
      let tcEls = tr.getElementsByTagNameNS(ns, 'tc');
      for (let tc of tcEls) cells.push(getCellText(tc));
      if (cells.length > 0) rows.push(cells);
    }
    if (rows.length === 0) { tables.push({ header: [], rows: [] }); continue; }
    let firstRow = rows[0];
    let isHeader = firstRow.every(c => c.trim() && c.trim().length < 30);
    tables.push(isHeader
      ? { header: firstRow.map(h => h.trim()), rows: rows.slice(1) }
      : { header: firstRow.map((_, i) => `列${i+1}`), rows }
    );
  }
  return { tables, paragraphs: [], format: 'docx' };
}

// ═══════════════════════════════════════════════
//  PDF PARSING ENGINE
// ═══════════════════════════════════════════════

async function parsePdf(file) {
  let buffer = await file.arrayBuffer();
  let pdf = await pdfjsLib.getDocument({ data: buffer }).promise;
  let pages = [];
  for (let i = 1; i <= pdf.numPages; i++) {
    let page = await pdf.getPage(i);
    let content = await page.getTextContent();
    let text = content.items.map(item => item.str).join(' ');
    pages.push({ page: i, text: text.trim() });
  }
  return { pages, format: 'pdf', numPages: pdf.numPages };
}

// ═══════════════════════════════════════════════
//  DIFF ENGINE
// ═══════════════════════════════════════════════

function cellDiffHtml(oldText, newText) {
  if (oldText.trim() === newText.trim()) return { html: escHtml(oldText), changed: false };
  let changes = Diff.diffChars(oldText, newText);
  let html = '';
  for (let c of changes) {
    if (c.added) html += '<ins class="i">' + escHtml(c.value) + '</ins>';
    else if (c.removed) html += '<del class="d">' + escHtml(c.value) + '</del>';
    else html += escHtml(c.value);
  }
  return { html, changed: true };
}

function compareTableRows(rows1, rows2, headers) {
  let map1 = {}, map2 = {};
  rows1.forEach((row, i) => { let k = (row[0]||'').trim(); if (k) map1[k] = { idx: i, row }; });
  rows2.forEach((row, i) => { let k = (row[0]||'').trim(); if (k) map2[k] = { idx: i, row }; });
  let allKeys = [...new Set([...Object.keys(map1), ...Object.keys(map2)])].sort();
  let changes = [];
  for (let key of allKeys) {
    let in1 = key in map1, in2 = key in map2;
    if (in1 && !in2) {
      let { idx, row } = map1[key];
      let cells = row.map((val, ci) => ({ header: headers[ci]||`列${ci+1}`, old: val, new: '', changed: true, diff_html: '<del class="d">'+escHtml(val)+'</del>' }));
      changes.push({ type: 'deleted', key, row_num_old: idx+2, row_num_new: null, cells });
    } else if (!in1 && in2) {
      let { idx, row } = map2[key];
      let cells = row.map((val, ci) => ({ header: headers[ci]||`列${ci+1}`, old: '', new: val, changed: true, diff_html: '<ins class="i">'+escHtml(val)+'</ins>' }));
      changes.push({ type: 'added', key, row_num_old: null, row_num_new: idx+2, cells });
    } else {
      let { idx: idx1, row: row1 } = map1[key], { idx: idx2, row: row2 } = map2[key];
      let maxCols = Math.max(row1.length, row2.length), cells = [], anyChanged = false;
      for (let ci = 0; ci < maxCols; ci++) {
        let oldVal = row1[ci]||'', newVal = row2[ci]||'';
        let { html, changed } = cellDiffHtml(oldVal, newVal);
        if (changed) anyChanged = true;
        cells.push({ header: headers[ci]||`列${ci+1}`, old: oldVal, new: newVal, changed, diff_html: html });
      }
      if (anyChanged) changes.push({ type: 'modified', key, row_num_old: idx1+2, row_num_new: idx2+2, cells });
    }
  }
  return changes;
}

function comparePdfPages(pages1, pages2) {
  let changes = [];
  let maxP = Math.max(pages1.length, pages2.length);
  for (let i = 0; i < maxP; i++) {
    let p1 = pages1[i], p2 = pages2[i];
    let text1 = p1 ? p1.text : '', text2 = p2 ? p2.text : '';
    let pageNum = (p1 || p2).page;

    if (!p1 && p2) {
      changes.push({ type: 'added', page: pageNum, text: text2, similarity: 0, diff_html: '<ins class="i">' + escHtml(text2.substring(0,500)) + '</ins>' });
    } else if (p1 && !p2) {
      changes.push({ type: 'deleted', page: pageNum, text: text1, similarity: 0, diff_html: '<del class="d">' + escHtml(text1.substring(0,500)) + '</del>' });
    } else {
      // Compare similarity
      let d = Diff.diffChars(text1, text2);
      let same = d.filter(c => !c.added && !c.removed).reduce((s, c) => s + c.value.length, 0);
      let total = Math.max(text1.length, text2.length) || 1;
      let similarity = Math.round(same / total * 100);
      if (similarity < 95) {
        let html = '';
        for (let c of d) {
          if (c.added) html += '<ins class="i">' + escHtml(c.value.substring(0,200)) + '</ins>';
          else if (c.removed) html += '<del class="d">' + escHtml(c.value.substring(0,200)) + '</del>';
          else html += escHtml(c.value.substring(0,200));
          if (html.length > 2000) { html += ' ...'; break; }
        }
        changes.push({ type: 'modified', page: pageNum, text: text2, similarity, diff_html: html });
      }
    }
  }
  return changes;
}

// ═══════════════════════════════════════════════
//  MAIN COMPARISON
// ═══════════════════════════════════════════════

async function compareDocuments(fileOld, fileNew) {
  let extOld = fileOld.name.toLowerCase().split('.').pop();
  let extNew = fileNew.name.toLowerCase().split('.').pop();

  if (extOld !== extNew) throw new Error('两份文件格式不一致（一个 .docx 一个 .pdf），请上传相同格式的文件');

  if (extOld === 'docx') {
    let [d1, d2] = await Promise.all([parseDocx(fileOld), parseDocx(fileNew)]);
    let results = { format: 'docx', old_file: fileOld.name, new_file: fileNew.name,
      old_tables: d1.tables.length, new_tables: d2.tables.length, table_results: [], total_changes: 0 };

    let fp = tab => tab.header.join('|');
    let fp1 = {}, fp2 = {};
    d1.tables.forEach((t, i) => { fp1[fp(t)] = i; });
    d2.tables.forEach((t, i) => { fp2[fp(t)] = i; });
    let allFps = [...new Set([...Object.keys(fp1), ...Object.keys(fp2)])];
    let ri = 0;

    for (let f of allFps) {
      let in1 = f in fp1, in2 = f in fp2;
      if (in1 && in2) {
        let t1 = d1.tables[fp1[f]], t2 = d2.tables[fp2[f]];
        let changes = compareTableRows(t1.rows, t2.rows, t1.header);
        results.table_results.push({ table_index: ri, headers: t1.header, total_rows_old: t1.rows.length, total_rows_new: t2.rows.length, changes });
        results.total_changes += changes.length;
      } else if (!in1 && in2) {
        let t2 = d2.tables[fp2[f]];
        let changes = t2.rows.map((row, ri2) => {
          let key = (row[0]||'').trim() || `行${ri2+1}`;
          return { type: 'added', key, row_num_old: null, row_num_new: ri2+2, cells: row.map((val, ci) => ({ header: t2.header[ci]||`列${ci+1}`, old: '', new: val, changed: true, diff_html: '<ins class="i">'+escHtml(val)+'</ins>' })) };
        });
        results.table_results.push({ table_index: ri, headers: t2.header, total_rows_old: 0, total_rows_new: t2.rows.length, changes });
        results.total_changes += changes.length;
      } else if (in1 && !in2) {
        let t1 = d1.tables[fp1[f]];
        let changes = t1.rows.map((row, ri2) => {
          let key = (row[0]||'').trim() || `行${ri2+1}`;
          return { type: 'deleted', key, row_num_old: ri2+2, row_num_new: null, cells: row.map((val, ci) => ({ header: t1.header[ci]||`列${ci+1}`, old: val, new: '', changed: true, diff_html: '<del class="d">'+escHtml(val)+'</del>' })) };
        });
        results.table_results.push({ table_index: ri, headers: t1.header, total_rows_old: t1.rows.length, total_rows_new: 0, changes });
        results.total_changes += changes.length;
      }
      ri++;
    }
    return results;
  }

  if (extOld === 'pdf') {
    let [p1, p2] = await Promise.all([parsePdf(fileOld), parsePdf(fileNew)]);
    let changes = comparePdfPages(p1.pages, p2.pages);
    return { format: 'pdf', old_file: fileOld.name, new_file: fileNew.name,
      old_pages: p1.numPages, new_pages: p2.numPages, total_changes: changes.length, changes };
  }

  throw new Error('不支持的文件格式，请上传 .docx 或 .pdf');
}

// ═══════════════════════════════════════════════
//  OUTPUT GENERATION
// ═══════════════════════════════════════════════

async function generateDocx(results) {
  const { Document, Packer, Paragraph, TextRun, Table, TableRow, TableCell, HeadingLevel, AlignmentType, WidthType } = docx;
  let children = [];
  children.push(new Paragraph({ heading: HeadingLevel.HEADING_1, alignment: AlignmentType.CENTER,
    children: [new TextRun({ text: '文档修改对比报告', bold: true, size: 36 })] }));
  children.push(new Paragraph({ text: '' }));
  children.push(new Paragraph({ children: [new TextRun({ text: '对比概览', bold: true, size: 28 })] }));
  for (let line of [`原始文档：${results.old_file}`, `修改文档：${results.new_file}`, `修改项总数：${results.total_changes} 项`])
    children.push(new Paragraph({ text: line, bullet: { level: 0 } }));
  children.push(new Paragraph({ text: '─'.repeat(60) }));

  if (results.format === 'docx') {
    for (let tr of results.table_results) {
      if (!tr.changes || tr.changes.length === 0) continue;
      children.push(new Paragraph({ text: '' }));
      children.push(new Paragraph({ heading: HeadingLevel.HEADING_2,
        children: [new TextRun({ text: `表格 ${tr.table_index+1}：${tr.total_rows_old}→${tr.total_rows_new}行，${tr.changes.length}项修改`, bold: true, size: 24 })] }));
      let hrow = new TableRow({ children: ['类型','章节/项目','原始行','新行','变更列'].map(t =>
        new TableCell({ children: [new Paragraph({ children: [new TextRun({ text: t, bold: true, size: 16 })]) }] })) });
      let srows = [hrow], tl = { added:'新增', deleted:'删除', modified:'修改' };
      for (let ch of tr.changes) {
        let cc = ch.cells.filter(c => c.changed).map(c => c.header).slice(0,3).join('、');
        srows.push(new TableRow({ children: [tl[ch.type]||ch.type, (ch.key||'').substring(0,60), String(ch.row_num_old||'-'), String(ch.row_num_new||'-'), cc].map(t =>
          new TableCell({ children: [new Paragraph({ children: [new TextRun({ text: t, size: 16 })]) }] })) }));
      }
      children.push(new Table({ rows: srows, width: { size: 100, type: WidthType.PERCENTAGE } }));
      children.push(new Paragraph({ text: '' }));
      for (let ch of tr.changes) {
        children.push(new Paragraph({ children: [new TextRun({ text: `${tl[ch.type]}：${(ch.key||'').substring(0,80)}`, bold: true, size: 20 })] }));
        for (let cc of ch.cells.filter(c => c.changed)) {
          children.push(new Paragraph({ children: [new TextRun({ text: `【${cc.header}】`, bold: true, size: 18 })] }));
          if (cc.old) children.push(new Paragraph({ children: [new TextRun({ text: `  原始：${cc.old}`, color: 'CC0000', size: 18 })] }));
          if (cc.new) children.push(new Paragraph({ children: [new TextRun({ text: `  修改：${cc.new}`, color: '008000', size: 18 })] }));
        }
      }
    }
  } else {
    for (let ch of results.changes) {
      children.push(new Paragraph({ text: '' }));
      let tl2 = { added:'新增', deleted:'删除', modified:'修改' };
      children.push(new Paragraph({ heading: HeadingLevel.HEADING_3,
        children: [new TextRun({ text: `${tl2[ch.type]}：第 ${ch.page} 页（相似度 ${ch.similarity}%）`, bold: true, size: 20 })] }));
      if (ch.text) children.push(new Paragraph({ children: [new TextRun({ text: ch.text.substring(0, 500), size: 18 })] }));
    }
  }
  let doc = new Document({ sections: [{ children }] });
  return await Packer.toBlob(doc);
}

// ═══════════════════════════════════════════════
//  UI
// ═══════════════════════════════════════════════

async function startCompare() {
  if (!files.old || !files.new) return;
  document.getElementById('results').classList.remove('active');
  document.getElementById('error-box').classList.remove('active');
  document.getElementById('loading').classList.add('active');
  document.getElementById('btn-compare').disabled = true;

  try {
    document.getElementById('loading-msg').textContent = '正在解析文档并逐项对比...';
    let results = await compareDocuments(files.old, files.new);
    lastResults = results;
    document.getElementById('loading').classList.remove('active');
    document.getElementById('btn-compare').disabled = false;
    showResults(results);
  } catch (e) {
    document.getElementById('loading').classList.remove('active');
    document.getElementById('btn-compare').disabled = false;
    showError('处理失败：' + e.message);
    console.error(e);
  }
}

function showResults(d) {
  // Summary
  if (d.format === 'docx') {
    let adds = 0, dels = 0, mods = 0;
    d.table_results.forEach(tr => tr.changes.forEach(c => { if (c.type==='added') adds++; else if (c.type==='deleted') dels++; else mods++; }));
    document.getElementById('summary-bar').innerHTML =
      '<div class="summary-item"><div class="num">'+d.old_tables+'</div><div class="label">原始表格数</div></div>'+
      '<div class="summary-item"><div class="num">'+d.new_tables+'</div><div class="label">修改表格数</div></div>'+
      '<div class="summary-item"><div class="num" style="color:#f87171">'+d.total_changes+'</div><div class="label">总修改项</div></div>'+
      '<div class="summary-item">'+
        '<span class="num-sm" style="color:#4ade80">+'+adds+'</span> '+
        '<span class="num-sm" style="color:#f87171">-'+dels+'</span> '+
        '<span class="num-sm" style="color:#fbbf24">~'+mods+'</span>'+
        '<div class="label">新增/删除/修改</div></div>';

    let html = '';
    d.table_results.forEach((tr, i) => {
      if (!tr.changes || tr.changes.length === 0) return;
      html += '<div class="table-result"><h2>表格 '+(i+1)+'：'+escHtml(tr.headers.join(' / '))+'</h2>';
      html += '<div class="table-meta"><span>原始：'+tr.total_rows_old+'行</span><span>修改：'+tr.total_rows_new+'行</span><span style="color:#f87171">'+tr.changes.length+'项修改</span></div>';
      let limit = 20;
      tr.changes.forEach((ch, j) => {
        let rc = ch.type, bc = 'badge-'+ch.type, bt = ch.type==='added'?'新增':ch.type==='deleted'?'删除':'修改';
        html += '<div class="change-row '+rc+'" id="tr-'+i+'-'+j+'"'+(j>=limit?' style="display:none"':'')+'>';
        html += '<div class="row-key"><span class="badge '+bc+'">'+bt+'</span> '+escHtml(ch.key)+'</div>';
        html += '<div class="row-meta">原始行'+(ch.row_num_old||'-')+' → 新行'+(ch.row_num_new||'-')+'</div>';
        let changedCells = ch.cells.filter(c => c.changed), uncCells = ch.cells.filter(c => !c.changed);
        changedCells.forEach(cc => { html += '<div class="cell-diff changed"><div class="cell-header">📌 '+escHtml(cc.header)+'</div><div>'+cc.diff_html+'</div></div>'; });
        if (uncCells.length > 0 && uncCells.length < ch.cells.length) {
          html += '<button class="collapse-btn" onclick="let n=this.nextElementSibling;n.style.display=n.style.display==\'none\'?\'\':\'none\'">展开未变化列 ('+uncCells.length+') ▸</button>';
          html += '<div style="display:none">';
          uncCells.forEach(cc => { html += '<div class="cell-diff unchanged"><div class="cell-header">'+escHtml(cc.header)+'</div><div>'+escHtml((cc.new||cc.old).substring(0,100))+'</div></div>'; });
          html += '</div>';
        }
        html += '</div>';
      });
      if (tr.changes.length > limit) html += '<button class="collapse-btn" onclick="for(let j='+limit+';j<'+tr.changes.length+';j++)document.getElementById(\'tr-'+i+'-\'+j).style.display=\'\';this.style.display=\'none\'">显示全部 '+tr.changes.length+' 项修改 ▾</button>';
      html += '</div>';
    });
    document.getElementById('detail-area').innerHTML = html || '<div class="table-result" style="text-align:center;padding:36px"><div style="font-size:40px">✅</div><p style="color:#4ade80;margin-top:8px">未发现任何修改！</p></div>';
  } else {
    document.getElementById('summary-bar').innerHTML =
      '<div class="summary-item"><div class="num">'+d.old_pages+'</div><div class="label">原始文档页数</div></div>'+
      '<div class="summary-item"><div class="num">'+d.new_pages+'</div><div class="label">修改文档页数</div></div>'+
      '<div class="summary-item"><div class="num" style="color:#f87171">'+d.total_changes+'</div><div class="label">有修改的页面</div></div>'+
      '<div class="summary-item"><div class="num">'+(d.total_changes>0?Math.round(d.total_changes/Math.max(d.new_pages,1)*100):0)+'%</div><div class="label">修改页占比</div></div>';

    let html = '';
    d.changes.forEach((ch, i) => {
      let rc = ch.type, bc = 'badge-'+ch.type, bt = ch.type==='added'?'新增页面':ch.type==='deleted'?'删除页面':'内容修改';
      html += '<div class="pdf-page-diff '+rc+'"><div><span class="badge '+bc+'">'+bt+'</span> <strong>第 '+ch.page+' 页</strong>'+(ch.similarity>0?' · 相似度 '+ch.similarity+'%':'')+'</div>';
      if (ch.diff_html) html += '<div style="margin-top:6px;line-height:1.7">'+ch.diff_html+'</div>';
      html += '</div>';
    });
    document.getElementById('detail-area').innerHTML = html || '<div class="table-result" style="text-align:center;padding:36px"><div style="font-size:40px">✅</div><p style="color:#4ade80;margin-top:8px">两份文档完全一致！</p></div>';
  }

  let dl = document.getElementById('download-bar');
  if (d.total_changes > 0) {
    dl.innerHTML = '<button class="btn-dl" onclick="downloadDocx()">📥 导出 Word 报告</button><button class="btn-dl html" onclick="downloadHtml()">📄 导出 HTML 报告</button>';
  } else { dl.innerHTML = ''; }
  document.getElementById('results').classList.add('active');
  document.getElementById('results').scrollIntoView({ behavior: 'smooth' });
}

async function downloadDocx() {
  if (!lastResults) return;
  try { let blob = await generateDocx(lastResults); saveAs(blob, 'diff_report.docx'); }
  catch(e) { showError('导出 Word 失败：'+e.message+'，请下载 HTML 版本'); }
}

function downloadHtml() {
  if (!lastResults) return;
  let d = lastResults;
  let h = '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>文档修改对比报告</title>';
  h += '<style>body{font-family:sans-serif;max-width:900px;margin:40px auto;padding:0 20px;color:#333;background:#f9fafb}h1{color:#1a1a2e;border-bottom:2px solid #0f3460}h2{color:#0f3460;margin-top:20px}table{border-collapse:collapse;width:100%;margin:10px 0}th,td{border:1px solid #ddd;padding:8px;font-size:13px}th{background:#f5f5f5}.added{background:#f0fdf4;border-left:3px solid #22c55e}.deleted{background:#fef2f2;border-left:3px solid #ef4444}.modified{background:#fffbeb;border-left:3px solid #f59e0b}.old{color:#991b1b;text-decoration:line-through}.new{color:#166534}.section{margin:12px 0;padding:12px;border:1px solid #e5e7eb;border-radius:6px;background:#fff}</style></head><body>';
  h += '<h1>文档修改对比报告</h1><p><strong>原始：</strong>'+escHtml(d.old_file)+' | <strong>修改：</strong>'+escHtml(d.new_file)+' | <strong>修改项：</strong>'+d.total_changes+' 项</p>';
  if (d.format === 'docx') {
    d.table_results.forEach(tr => {
      if (!tr.changes||tr.changes.length===0) return;
      h += '<h2>表格 '+(tr.table_index+1)+'：'+escHtml(tr.headers.join(' / '))+'</h2>';
      let tl = {added:'新增',deleted:'删除',modified:'修改'};
      tr.changes.forEach(ch => {
        h += '<div class="section '+ch.type+'"><h3>'+tl[ch.type]+'：'+escHtml(ch.key)+'</h3>';
        ch.cells.filter(c=>c.changed).forEach(cc => {
          h += '<p><strong>'+escHtml(cc.header)+'：</strong></p>';
          if (cc.old) h += '<p class="old">'+escHtml(cc.old)+'</p>';
          if (cc.new) h += '<p class="new">'+escHtml(cc.new)+'</p>';
        });
        h += '</div>';
      });
    });
  } else {
    d.changes.forEach(ch => {
      h += '<div class="section '+ch.type+'"><h3>第 '+ch.page+' 页 · '+(ch.type==='added'?'新增':ch.type==='deleted'?'删除':'修改')+'</h3>';
      h += '<p>'+escHtml(ch.text.substring(0,500))+'</p></div>';
    });
  }
  h += '</body></html>';
  saveAs(new Blob([h],{type:'text/html;charset=utf-8'}), 'diff_report.html');
}

function showError(m) {
  let b = document.getElementById('error-box');
  b.textContent = '⚠️ ' + m; b.classList.add('active');
  b.scrollIntoView({ behavior: 'smooth' });
}
</script>
