<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word 文档差异对比 — 纯浏览器版</title>

<!-- JSZip: read .docx (zip of XML) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<!-- diff: text comparison -->
<script src="https://cdn.jsdelivr.net/npm/diff@5.2.0/dist/diff.min.js"></script>
<!-- docx: generate output .docx -->
<script src="https://unpkg.com/docx@8.5.0/build/index.umd.js"></script>
<!-- FileSaver: trigger download -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans SC",sans-serif;background:#f0f2f5;color:#1a1a2e;line-height:1.6;min-height:100vh}
.header{background:linear-gradient(135deg,#1a1a2e,#16213e 50%,#0f3460);color:#fff;padding:28px 24px;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.15)}
.header h1{font-size:26px;font-weight:700;margin-bottom:6px;letter-spacing:.5px}
.header p{font-size:14px;opacity:.8;max-width:560px;margin:0 auto}
.header .badge-pure{display:inline-block;background:rgba(255,255,255,.15);color:#fff;font-size:11px;padding:3px 10px;border-radius:10px;margin-top:6px}
.container{max-width:1100px;margin:0 auto;padding:28px 20px}
.upload-section{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:28px}
@media(max-width:700px){.upload-section{grid-template-columns:1fr}}
.upload-card{background:#fff;border-radius:14px;padding:28px 20px;text-align:center;box-shadow:0 2px 10px rgba(0,0,0,.05);transition:all .25s;border:2px dashed #d0d5dd;cursor:pointer}
.upload-card:hover{border-color:#0f3460;box-shadow:0 6px 20px rgba(15,52,96,.1);transform:translateY(-1px)}
.upload-card.dragover{border-color:#0f3460;background:#f0f5ff;transform:scale(1.02)}
.upload-card.has-file{border-color:#22c55e;border-style:solid;background:#f0fdf4}
.upload-icon{width:50px;height:50px;margin:0 auto 14px;background:#e8edf5;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;transition:all .25s}
.upload-card.has-file .upload-icon{background:#dcfce7}
.upload-card h3{font-size:16px;margin-bottom:4px}
.upload-card .hint{font-size:12px;color:#6b7280;margin-bottom:10px}
.upload-card .file-name{display:none;font-size:13px;font-weight:600;color:#16a34a;margin-top:6px;word-break:break-all}
.upload-card.has-file .file-name{display:block}
.upload-card.has-file .hint{display:none}
.btn-remove{display:none;margin-top:8px;background:#fee2e2;color:#dc2626;border:none;padding:4px 14px;border-radius:5px;font-size:12px;cursor:pointer}
.upload-card.has-file .btn-remove{display:inline-block}
.btn-remove:hover{background:#fecaca}
.action-bar{text-align:center;margin-bottom:28px}
.btn-compare{background:linear-gradient(135deg,#0f3460,#1a1a2e);color:#fff;border:none;padding:12px 44px;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;transition:all .25s;box-shadow:0 3px 14px rgba(15,52,96,.25)}
.btn-compare:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 6px 20px rgba(15,52,96,.35)}
.btn-compare:disabled{opacity:.45;cursor:not-allowed}
.loading{display:none;text-align:center;padding:36px}
.loading.active{display:block}
.spinner{width:40px;height:40px;border:4px solid #e5e7eb;border-top-color:#0f3460;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading p{color:#6b7280;font-size:13px}
.error-box{display:none;background:#fef2f2;border:1px solid #fecaca;color:#991b1b;padding:12px 16px;border-radius:8px;margin-bottom:20px;font-size:13px}
.error-box.active{display:block}
.results{display:none}
.results.active{display:block}
.summary-bar{background:#fff;border-radius:14px;padding:20px 24px;box-shadow:0 2px 10px rgba(0,0,0,.05);margin-bottom:20px;display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
@media(max-width:700px){.summary-bar{grid-template-columns:repeat(2,1fr)}}
.summary-item{text-align:center}
.summary-item .num{font-size:28px;font-weight:700;color:#0f3460}
.summary-item .num-sm{font-size:18px;font-weight:600}
.summary-item .label{font-size:12px;color:#6b7280;margin-top:2px}

.table-result{background:#fff;border-radius:14px;padding:20px 24px;box-shadow:0 2px 10px rgba(0,0,0,.05);margin-bottom:18px}
.table-result h2{font-size:16px;margin-bottom:12px}
.table-meta{display:flex;gap:14px;margin-bottom:14px;font-size:12px;color:#6b7280}
.change-row{border:1px solid #e5e7eb;border-radius:8px;padding:14px;margin-bottom:10px}
.change-row.added{border-left:4px solid #22c55e;background:#f0fdf4}
.change-row.deleted{border-left:4px solid #ef4444;background:#fef2f2}
.change-row.modified{border-left:4px solid #f59e0b;background:#fffbeb}
.row-key{font-weight:700;font-size:13px;margin-bottom:6px}
.row-meta{font-size:11px;color:#6b7280;margin-bottom:6px}
.cell-diff{padding:6px 10px;margin:3px 0;border-radius:5px;font-size:12px;line-height:1.5}
.cell-diff .cell-header{font-weight:600;font-size:10px;color:#6b7280;margin-bottom:2px;text-transform:uppercase}
.cell-diff.changed{background:#fff;border:1px solid #e5e7eb}
.cell-diff.unchanged{background:#f9fafb;color:#9ca3af}
.d{background:#fecaca;color:#991b1b;text-decoration:line-through;padding:1px 3px;border-radius:2px}
.i{background:#bbf7d0;color:#166534;padding:1px 3px;border-radius:2px}

.badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;display:inline-block}
.badge-added{background:#dcfce7;color:#166534}
.badge-deleted{background:#fee2e2;color:#991b1b}
.badge-modified{background:#fef9c3;color:#854d0e}

.download-bar{text-align:center;margin-top:20px}
.btn-download{background:linear-gradient(135deg,#059669,#047857);color:#fff;border:none;padding:12px 36px;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;transition:all .25s;box-shadow:0 3px 14px rgba(5,150,105,.25);text-decoration:none;display:inline-block}
.btn-download:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(5,150,105,.35)}
.btn-html{background:linear-gradient(135deg,#6366f1,#4f46e5);box-shadow:0 3px 14px rgba(99,102,241,.25);margin-left:10px}
.btn-html:hover{box-shadow:0 6px 20px rgba(99,102,241,.35)}
.footer{text-align:center;padding:20px;color:#9ca3af;font-size:12px}
.hidden-input{display:none}
.collapse-btn{background:none;border:none;color:#0f3460;cursor:pointer;font-size:12px;padding:4px 8px;margin-top:2px}
.collapse-btn:hover{text-decoration:underline}
</style>
</head>
<body>

<div class="header">
  <h1>📄 Word 文档差异对比</h1>
  <p>上传两份 .docx 文档，逐表逐行逐单元格对比差异。所有处理在浏览器本地完成，不上传任何服务器。</p>
  <span class="badge-pure">🔒 纯浏览器版本 · 零服务器依赖</span>
</div>

<div class="container">

<div class="upload-section">
  <div class="upload-card" id="card-old" onclick="document.getElementById('input-old').click()">
    <div class="upload-icon">📋</div>
    <h3>原始文档（修改前）</h3>
    <p class="hint">点击上传或拖拽 .docx 文件到此处</p>
    <p class="file-name" id="name-old"></p>
    <button class="btn-remove" id="remove-old" onclick="removeFile('old',event)">✕ 移除</button>
  </div>
  <div class="upload-card" id="card-new" onclick="document.getElementById('input-new').click()">
    <div class="upload-icon">📝</div>
    <h3>修改文档（修改后）</h3>
    <p class="hint">点击上传或拖拽 .docx 文件到此处</p>
    <p class="file-name" id="name-new"></p>
    <button class="btn-remove" id="remove-new" onclick="removeFile('new',event)">✕ 移除</button>
  </div>
</div>

<input type="file" id="input-old" class="hidden-input" accept=".docx" onchange="handleFileSelect('old',this)">
<input type="file" id="input-new" class="hidden-input" accept=".docx" onchange="handleFileSelect('new',this)">

<div class="action-bar">
  <button class="btn-compare" id="btn-compare" disabled onclick="startCompare()">🔍 开始对比</button>
</div>

<div class="loading" id="loading"><div class="spinner"></div><p>正在解析文档并逐行对比，请稍候...</p></div>
<div class="error-box" id="error-box"></div>
<div class="results" id="results">
  <div class="summary-bar" id="summary-bar"></div>
  <div id="detail-area"></div>
  <div class="download-bar" id="download-bar"></div>
</div>

</div>
<div class="footer">纯浏览器版本 · 基于 JSZip + diff + docx.js · 所有处理均在本地完成</div>

<script>
// ─── State ────────────────────────────────────
let files = { old: null, new: null };
let lastResults = null;

// ─── File Handling ────────────────────────────
function handleFileSelect(type, input) {
  if (input.files.length > 0) {
    files[type] = input.files[0];
    updateCard(type);
  }
}
function removeFile(type, event) {
  event.stopPropagation();
  files[type] = null;
  document.getElementById('input-' + type).value = '';
  updateCard(type);
}
function updateCard(type) {
  let c = document.getElementById('card-' + type);
  let n = document.getElementById('name-' + type);
  if (files[type]) {
    c.classList.add('has-file');
    n.textContent = '📎 ' + files[type].name;
  } else {
    c.classList.remove('has-file');
    n.textContent = '';
  }
  document.getElementById('btn-compare').disabled = !(files.old && files.new);
}

// Drag & drop
['old','new'].forEach(type => {
  let c = document.getElementById('card-' + type);
  c.addEventListener('dragover', e => { e.preventDefault(); c.classList.add('dragover'); });
  c.addEventListener('dragleave', () => c.classList.remove('dragover'));
  c.addEventListener('drop', e => {
    e.preventDefault();
    c.classList.remove('dragover');
    let f = e.dataTransfer.files[0];
    if (f && f.name.toLowerCase().endsWith('.docx')) {
      files[type] = f;
      updateCard(type);
    } else {
      showError('请上传 .docx 格式文件');
    }
  });
});

// ─── .docx Parsing Engine ──────────────────────

function getCellText(tcElement) {
  /** Extract all text from a w:tc (table cell) XML element. */
  let texts = [];
  let paragraphs = tcElement.getElementsByTagNameNS('http://schemas.openxmlformats.org/wordprocessingml/2006/main', 'p');
  for (let p of paragraphs) {
    let parts = [];
    let runs = p.getElementsByTagNameNS('http://schemas.openxmlformats.org/wordprocessingml/2006/main', 'r');
    for (let r of runs) {
      let tEls = r.getElementsByTagNameNS('http://schemas.openxmlformats.org/wordprocessingml/2006/main', 't');
      for (let t of tEls) {
        parts.push(t.textContent || '');
      }
    }
    if (parts.length > 0) texts.push(parts.join(''));
  }
  return texts.join('\n');
}

async function parseDocx(file) {
  /** Parse a .docx file: return { tables: [{header, rows}], paragraphs: [text] } */
  let buffer = await file.arrayBuffer();
  let zip = await JSZip.loadAsync(buffer);
  let xmlText = await zip.file('word/document.xml').async('string');
  let parser = new DOMParser();
  let xmlDoc = parser.parseFromString(xmlText, 'text/xml');
  let ns = 'http://schemas.openxmlformats.org/wordprocessingml/2006/main';

  // Extract paragraphs
  let paragraphs = [];
  let body = xmlDoc.getElementsByTagNameNS(ns, 'body')[0];
  if (body) {
    let paraEls = body.getElementsByTagNameNS(ns, 'p');
    for (let p of paraEls) {
      // Skip paragraphs inside tables
      if (p.closest('w\\:tbl') || p.closest('tbl')) continue;
      let text = '';
      let runs = p.getElementsByTagNameNS(ns, 'r');
      for (let r of runs) {
        let tEls = r.getElementsByTagNameNS(ns, 't');
        for (let t of tEls) text += (t.textContent || '');
      }
      if (text.trim()) paragraphs.push(text.trim());
    }
  }

  // Extract tables
  let tables = [];
  let tblEls = body.getElementsByTagNameNS(ns, 'tbl');
  for (let tbl of tblEls) {
    let rows = [];
    let trEls = tbl.getElementsByTagNameNS(ns, 'tr');
    for (let tr of trEls) {
      let cells = [];
      let tcEls = tr.getElementsByTagNameNS(ns, 'tc');
      for (let tc of tcEls) {
        cells.push(getCellText(tc));
      }
      if (cells.length > 0) rows.push(cells);
    }
    if (rows.length === 0) { tables.push({ header: [], rows: [] }); continue; }
    // Heuristic: first row is header if all cells non-empty and short
    let firstRow = rows[0];
    let isHeader = firstRow.every(c => c.trim() && c.trim().length < 30);
    if (isHeader) {
      tables.push({ header: firstRow.map(h => h.trim()), rows: rows.slice(1) });
    } else {
      tables.push({ header: firstRow.map((_, i) => `列${i+1}`), rows: rows });
    }
  }

  return { tables, paragraphs };
}

// ─── Diff Engine ───────────────────────────────

function cellDiffHtml(oldText, newText) {
  if (oldText.trim() === newText.trim()) return { html: escHtml(oldText), changed: false };
  let changes = Diff.diffChars(oldText, newText);
  let html = '';
  for (let c of changes) {
    if (c.added) {
      html += '<ins class="i">' + escHtml(c.value) + '</ins>';
    } else if (c.removed) {
      html += '<del class="d">' + escHtml(c.value) + '</del>';
    } else {
      html += escHtml(c.value);
    }
  }
  return { html, changed: true };
}

function escHtml(s) {
  let d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function compareTableRows(rows1, rows2, headers) {
  let map1 = {}, map2 = {};
  rows1.forEach((row, i) => { let k = (row[0]||'').trim(); if (k) map1[k] = { idx: i, row }; });
  rows2.forEach((row, i) => { let k = (row[0]||'').trim(); if (k) map2[k] = { idx: i, row }; });

  let allKeys = [...new Set([...Object.keys(map1), ...Object.keys(map2)])].sort();
  let changes = [];

  for (let key of allKeys) {
    let in1 = key in map1, in2 = key in map2;

    if (in1 && !in2) {
      let { idx, row } = map1[key];
      let cells = row.map((val, ci) => {
        let hdr = headers[ci] || `列${ci+1}`;
        return { header: hdr, old: val, new: '', changed: true, diff_html: '<del class="d">' + escHtml(val) + '</del>' };
      });
      changes.push({ type: 'deleted', key, row_num_old: idx + 2, row_num_new: null, cells });
    } else if (!in1 && in2) {
      let { idx, row } = map2[key];
      let cells = row.map((val, ci) => {
        let hdr = headers[ci] || `列${ci+1}`;
        return { header: hdr, old: '', new: val, changed: true, diff_html: '<ins class="i">' + escHtml(val) + '</ins>' };
      });
      changes.push({ type: 'added', key, row_num_old: null, row_num_new: idx + 2, cells });
    } else {
      let { idx: idx1, row: row1 } = map1[key];
      let { idx: idx2, row: row2 } = map2[key];
      let maxCols = Math.max(row1.length, row2.length);
      let cells = [];
      let anyChanged = false;
      for (let ci = 0; ci < maxCols; ci++) {
        let oldVal = row1[ci] || '', newVal = row2[ci] || '';
        let hdr = headers[ci] || `列${ci+1}`;
        let { html, changed } = cellDiffHtml(oldVal, newVal);
        if (changed) anyChanged = true;
        cells.push({ header: hdr, old: oldVal, new: newVal, changed, diff_html: html });
      }
      if (anyChanged) {
        changes.push({ type: 'modified', key, row_num_old: idx1 + 2, row_num_new: idx2 + 2, cells });
      }
    }
  }
  return changes;
}

async function compareDocuments(fileOld, fileNew) {
  let p1 = parseDocx(fileOld), p2 = parseDocx(fileNew);
  let [d1, d2] = await Promise.all([p1, p2]);

  let results = {
    old_file: fileOld.name,
    new_file: fileNew.name,
    old_tables: d1.tables.length,
    new_tables: d2.tables.length,
    table_results: [],
    total_changes: 0,
  };

  // Match tables by header fingerprint
  let fp = tab => tab.header.join('|');
  let fp1 = {}, fp2 = {};
  d1.tables.forEach((t, i) => { fp1[fp(t)] = i; });
  d2.tables.forEach((t, i) => { fp2[fp(t)] = i; });
  let allFps = [...new Set([...Object.keys(fp1), ...Object.keys(fp2)])];
  let resultIdx = 0;

  for (let f of allFps) {
    let in1 = f in fp1, in2 = f in fp2;

    if (in1 && in2) {
      let t1 = d1.tables[fp1[f]], t2 = d2.tables[fp2[f]];
      let changes = compareTableRows(t1.rows, t2.rows, t1.header);
      results.table_results.push({
        table_index: resultIdx, headers: t1.header,
        total_rows_old: t1.rows.length, total_rows_new: t2.rows.length, changes
      });
      results.total_changes += changes.length;
    } else if (!in1 && in2) {
      let t2 = d2.tables[fp2[f]];
      let changes = t2.rows.map((row, ri) => {
        let key = (row[0]||'').trim() || `行${ri+1}`;
        let cells = row.map((val, ci) => ({
          header: t2.header[ci] || `列${ci+1}`, old: '', new: val, changed: true,
          diff_html: '<ins class="i">' + escHtml(val) + '</ins>'
        }));
        return { type: 'added', key, row_num_old: null, row_num_new: ri + 2, cells };
      });
      results.table_results.push({
        table_index: resultIdx, headers: t2.header,
        total_rows_old: 0, total_rows_new: t2.rows.length, changes
      });
      results.total_changes += changes.length;
    } else if (in1 && !in2) {
      let t1 = d1.tables[fp1[f]];
      let changes = t1.rows.map((row, ri) => {
        let key = (row[0]||'').trim() || `行${ri+1}`;
        let cells = row.map((val, ci) => ({
          header: t1.header[ci] || `列${ci+1}`, old: val, new: '', changed: true,
          diff_html: '<del class="d">' + escHtml(val) + '</del>'
        }));
        return { type: 'deleted', key, row_num_old: ri + 2, row_num_new: null, cells };
      });
      results.table_results.push({
        table_index: resultIdx, headers: t1.header,
        total_rows_old: t1.rows.length, total_rows_new: 0, changes
      });
      results.total_changes += changes.length;
    }
    resultIdx++;
  }

  return results;
}

// ─── Output Generation ─────────────────────────

async function generateDocx(results) {
  const { Document, Packer, Paragraph, TextRun, Table, TableRow, TableCell,
    HeadingLevel, AlignmentType, WidthType, BorderStyle, ShadingType } = docx;

  let children = [];

  // Title
  children.push(new Paragraph({
    heading: HeadingLevel.HEADING_1,
    alignment: AlignmentType.CENTER,
    children: [new TextRun({ text: '文档修改对比报告', bold: true, size: 36 })]
  }));
  children.push(new Paragraph({ text: '' }));
  children.push(new Paragraph({
    children: [new TextRun({ text: '对比概览', bold: true, size: 28 })]
  }));
  for (let line of [
    `原始文档：${results.old_file}`,
    `修改文档：${results.new_file}`,
    `修改项总数：${results.total_changes} 项`
  ]) {
    children.push(new Paragraph({ text: line, bullet: { level: 0 } }));
  }
  children.push(new Paragraph({ text: '─'.repeat(60) }));

  // Each table
  for (let tr of results.table_results) {
    if (!tr.changes || tr.changes.length === 0) continue;

    children.push(new Paragraph({ text: '' }));
    children.push(new Paragraph({
      heading: HeadingLevel.HEADING_2,
      children: [new TextRun({
        text: `表格 ${tr.table_index + 1}：${tr.total_rows_old}→${tr.total_rows_new}行，${tr.changes.length}项修改`,
        bold: true, size: 24
      })]
    }));

    // Summary table
    let headerRow = new TableRow({
      children: ['类型', '章节/项目', '原始行', '新行', '变更列'].map(t =>
        new TableCell({
          children: [new Paragraph({ children: [new TextRun({ text: t, bold: true, size: 16 })] })],
          width: { size: 20, type: WidthType.PERCENTAGE }
        })
      )
    });
    let summaryRows = [headerRow];
    let tl = { added: '新增', deleted: '删除', modified: '修改' };
    for (let ch of tr.changes) {
      let changedCols = ch.cells.filter(c => c.changed).map(c => c.header).slice(0, 3).join('、');
      summaryRows.push(new TableRow({
        children: [
          tl[ch.type] || ch.type,
          (ch.key || '').substring(0, 60),
          String(ch.row_num_old || '-'),
          String(ch.row_num_new || '-'),
          changedCols
        ].map(t => new TableCell({
          children: [new Paragraph({ children: [new TextRun({ text: t, size: 16 })] })],
          width: { size: 20, type: WidthType.PERCENTAGE }
        }))
      }));
    }
    children.push(new Table({ rows: summaryRows, width: { size: 100, type: WidthType.PERCENTAGE } }));

    // Details
    children.push(new Paragraph({ text: '' }));
    children.push(new Paragraph({
      heading: HeadingLevel.HEADING_3,
      children: [new TextRun({ text: '修改详情', bold: true, size: 22 })]
    }));

    for (let ch of tr.changes) {
      children.push(new Paragraph({ text: '' }));
      children.push(new Paragraph({
        children: [new TextRun({ text: `${tl[ch.type]}：${(ch.key||'').substring(0, 80)}`, bold: true, size: 20 })]
      }));

      for (let cc of ch.cells.filter(c => c.changed)) {
        children.push(new Paragraph({
          children: [new TextRun({ text: `【${cc.header}】`, bold: true, size: 18 })]
        }));
        if (cc.old) {
          children.push(new Paragraph({
            children: [new TextRun({ text: `  原始：${cc.old}`, color: 'CC0000', size: 18 })]
          }));
        }
        if (cc.new) {
          children.push(new Paragraph({
            children: [new TextRun({ text: `  修改：${cc.new}`, color: '008000', size: 18 })]
          }));
        }
      }
    }
  }

  let doc = new Document({ sections: [{ children }] });
  return await Packer.toBlob(doc);
}

// ─── UI Rendering ──────────────────────────────

async function startCompare() {
  if (!files.old || !files.new) return;
  document.getElementById('results').classList.remove('active');
  document.getElementById('error-box').classList.remove('active');
  document.getElementById('loading').classList.add('active');
  document.getElementById('btn-compare').disabled = true;

  try {
    let results = await compareDocuments(files.old, files.new);
    lastResults = results;
    document.getElementById('loading').classList.remove('active');
    document.getElementById('btn-compare').disabled = false;
    showResults(results);
  } catch (e) {
    document.getElementById('loading').classList.remove('active');
    document.getElementById('btn-compare').disabled = false;
    showError('处理失败：' + e.message);
    console.error(e);
  }
}

function showResults(d) {
  // Summary
  let adds = 0, dels = 0, mods = 0;
  d.table_results.forEach(tr => {
    tr.changes.forEach(c => {
      if (c.type === 'added') adds++;
      else if (c.type === 'deleted') dels++;
      else mods++;
    });
  });

  document.getElementById('summary-bar').innerHTML =
    '<div class="summary-item"><div class="num">' + d.old_tables + '</div><div class="label">原始表格数</div></div>' +
    '<div class="summary-item"><div class="num">' + d.new_tables + '</div><div class="label">修改表格数</div></div>' +
    '<div class="summary-item"><div class="num" style="color:#dc2626">' + d.total_changes + '</div><div class="label">总修改项</div></div>' +
    '<div class="summary-item">' +
      '<span class="num-sm" style="color:#22c55e">+' + adds + '</span> ' +
      '<span class="num-sm" style="color:#ef4444">-' + dels + '</span> ' +
      '<span class="num-sm" style="color:#f59e0b">~' + mods + '</span>' +
      '<div class="label">新增/删除/修改</div></div>';

  // Detail tables
  let html = '';
  d.table_results.forEach((tr, i) => {
    if (!tr.changes || tr.changes.length === 0) return;
    html += '<div class="table-result"><h2>📊 表格 ' + (i + 1) + '：' + escHtml(tr.headers.join(' / ')) + '</h2>';
    html += '<div class="table-meta"><span>原始：' + tr.total_rows_old + '行</span><span>修改：' + tr.total_rows_new + '行</span><span style="color:#dc2626;font-weight:600">' + tr.changes.length + '项修改</span></div>';

    let showLimit = 20;
    tr.changes.forEach((ch, j) => {
      let rowClass = ch.type === 'added' ? 'added' : ch.type === 'deleted' ? 'deleted' : 'modified';
      let badgeClass = ch.type === 'added' ? 'badge-added' : ch.type === 'deleted' ? 'badge-deleted' : 'badge-modified';
      let badgeText = ch.type === 'added' ? '新增' : ch.type === 'deleted' ? '删除' : '修改';

      html += '<div class="change-row ' + rowClass + '" id="tr-' + i + '-' + j + '"' + (j >= showLimit ? ' style="display:none"' : '') + '>';
      html += '<div class="row-key"><span class="badge ' + badgeClass + '">' + badgeText + '</span> ' + escHtml(ch.key) + '</div>';
      html += '<div class="row-meta">原始行' + (ch.row_num_old || '-') + ' → 新行' + (ch.row_num_new || '-') + '</div>';

      let changedCells = ch.cells.filter(c => c.changed);
      let uncCells = ch.cells.filter(c => !c.changed);
      changedCells.forEach(cc => {
        html += '<div class="cell-diff changed"><div class="cell-header">📌 ' + escHtml(cc.header) + '</div><div>' + cc.diff_html + '</div></div>';
      });
      if (uncCells.length > 0 && uncCells.length < ch.cells.length) {
        html += '<button class="collapse-btn" onclick="let n=this.nextElementSibling;n.style.display=n.style.display==\'none\'?\'\':\'none\'">展开未变化列 (' + uncCells.length + ') ▸</button>';
        html += '<div style="display:none">';
        uncCells.forEach(cc => {
          html += '<div class="cell-diff unchanged"><div class="cell-header">' + escHtml(cc.header) + '</div><div>' + escHtml((cc.new || cc.old).substring(0, 100)) + '</div></div>';
        });
        html += '</div>';
      }
      html += '</div>';
    });

    if (tr.changes.length > showLimit) {
      html += '<button class="collapse-btn" onclick="for(let j=' + showLimit + ';j<' + tr.changes.length + ';j++)document.getElementById(\'tr-' + i + '-\'+j).style.display=\'\';this.style.display=\'none\'">显示全部 ' + tr.changes.length + ' 项修改 ▾</button>';
    }
    html += '</div>';
  });

  document.getElementById('detail-area').innerHTML = html ||
    '<div class="table-result" style="text-align:center;padding:40px"><div style="font-size:44px">✅</div><h3 style="color:#059669;margin-top:8px">未发现任何修改！</h3></div>';

  // Download buttons
  let dl = document.getElementById('download-bar');
  if (d.total_changes > 0) {
    dl.innerHTML =
      '<button class="btn-download" onclick="downloadDocx()">📥 导出修改报告（Word 文件）</button>' +
      '<button class="btn-download btn-html" onclick="downloadHtml()">📄 导出修改报告（HTML 文件）</button>';
  } else {
    dl.innerHTML = '';
  }

  document.getElementById('results').classList.add('active');
  document.getElementById('results').scrollIntoView({ behavior: 'smooth' });
}

async function downloadDocx() {
  if (!lastResults) return;
  try {
    let blob = await generateDocx(lastResults);
    saveAs(blob, 'diff_report.docx');
  } catch (e) {
    showError('导出 Word 失败：' + e.message + '，请尝试下载 HTML 版本');
    console.error(e);
  }
}

function downloadHtml() {
  if (!lastResults) return;
  // Generate a standalone HTML report
  let d = lastResults;
  let html = '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>文档修改对比报告</title>';
  html += '<style>body{font-family:sans-serif;max-width:900px;margin:40px auto;padding:0 20px;color:#333}' +
    'h1{color:#1a1a2e;border-bottom:2px solid #0f3460;padding-bottom:8px}' +
    'h2{color:#0f3460;margin-top:24px}' +
    'table{border-collapse:collapse;width:100%;margin:12px 0}' +
    'th,td{border:1px solid #ddd;padding:8px;text-align:left;font-size:13px}' +
    'th{background:#f5f5f5;font-weight:600}' +
    '.added{background:#f0fdf4;border-left:4px solid #22c55e}' +
    '.deleted{background:#fef2f2;border-left:4px solid #ef4444}' +
    '.modified{background:#fffbeb;border-left:4px solid #f59e0b}' +
    '.old{color:#991b1b;text-decoration:line-through}' +
    '.new{color:#166534}' +
    'h3{font-size:14px;margin:8px 0 4px}' +
    '.section{margin:16px 0;padding:12px;border:1px solid #e5e7eb;border-radius:8px}' +
    '</style></head><body>';
  html += '<h1>文档修改对比报告</h1>';
  html += '<p><strong>原始文档：</strong>' + escHtml(d.old_file) + '</p>';
  html += '<p><strong>修改文档：</strong>' + escHtml(d.new_file) + '</p>';
  html += '<p><strong>修改项总数：</strong>' + d.total_changes + ' 项</p>';

  let tl = { added: '新增', deleted: '删除', modified: '修改' };
  d.table_results.forEach(tr => {
    if (!tr.changes || tr.changes.length === 0) return;
    html += '<h2>表格 ' + (tr.table_index + 1) + '：' + escHtml(tr.headers.join(' / ')) + '</h2>';
    html += '<p>原始 ' + tr.total_rows_old + ' 行 → 修改 ' + tr.total_rows_new + ' 行，' + tr.changes.length + ' 项修改</p>';
    tr.changes.forEach(ch => {
      html += '<div class="section ' + ch.type + '">';
      html += '<h3>' + tl[ch.type] + '：' + escHtml(ch.key) + '</h3>';
      html += '<p style="font-size:12px;color:#6b7280">原始行' + (ch.row_num_old || '-') + ' → 新行' + (ch.row_num_new || '-') + '</p>';
      ch.cells.filter(c => c.changed).forEach(cc => {
        html += '<p><strong>' + escHtml(cc.header) + '：</strong></p>';
        if (cc.old) html += '<p class="old">' + escHtml(cc.old) + '</p>';
        if (cc.new) html += '<p class="new">' + escHtml(cc.new) + '</p>';
      });
      html += '</div>';
    });
  });
  html += '</body></html>';

  let blob = new Blob([html], { type: 'text/html;charset=utf-8' });
  saveAs(blob, 'diff_report.html');
}

function showError(m) {
  let b = document.getElementById('error-box');
  b.textContent = '⚠️ ' + m;
  b.classList.add('active');
  b.scrollIntoView({ behavior: 'smooth' });
}
</script>
